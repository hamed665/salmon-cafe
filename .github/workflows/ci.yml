name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use self-host package manifest
        run: cp package.selfhost.json package.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate database client
        run: npm run db:generate

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
