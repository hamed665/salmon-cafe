services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: salmon-cafe-app
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - "3000:3000"
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    container_name: salmon-cafe-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: salmon_cafe
      POSTGRES_USER: salmon_cafe
      POSTGRES_PASSWORD: salmon_cafe
    volumes:
      - salmon_cafe_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  salmon_cafe_pgdata:
